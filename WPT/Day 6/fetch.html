<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch</title>
</head>

<body>

    <body>

        <button onclick="fetchUserData()">Fetch Data</button>
        <table border="1" cellpadding="10" cellspacing="0">
            <thead>
                <th>ID</th>
                <th>Username</th>
                <th>Name</th>
                <th>Phone</th>
                <th>Email</th>

            </thead>
            <tbody id="tbody">

            </tbody>

        </table>
        <script>
            async function fetchUserData() {
                try {
                    const response = await fetch("https://jsonplaceholder.typicode.com/users")
                    console.log(response);
                    console.log(response.status);

                    const responseData = await response.json();
                    console.log(responseData);

                    const tbody = document.getElementById("tbody");

                    for (const user of responseData) {
                        const tableRow = document.createElement("tr");

                        const idCol = document.createElement("td");
                        const userNameCol = document.createElement("td");
                        const nameCol = document.createElement("td");
                        const phoneNoCol = document.createElement("td");
                        const emailCol = document.createElement("td");
                        tableRow.appendChild(idCol);
                        tableRow.appendChild(userNameCol);
                        tableRow.appendChild(nameCol);
                        tableRow.appendChild(phoneNoCol);
                        tableRow.appendChild(emailCol);

                        idCol.innerHTML = user.id;
                        userNameCol.innerHTML = user.username;
                        nameCol.innerHTML = user.name;
                        emailCol.innerHTML = user.email;
                        phoneNoCol.innerHTML = user.phone;

                        tbody.appendChild(tableRow);
                    }



                } catch (error) {
                    console.log(error);
                }
            }

        </script>
    </body>

</html>
